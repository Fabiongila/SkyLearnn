services:
  - type: web
    name: skylearn-web
    env: python
    runtime: python-3.11
    pythonVersion: "3.11"
    buildCommand: pip install --upgrade pip setuptools && pip install --prefer-binary -r requirements/production.txt
    startCommand: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
